name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # GitHub Packages registry (so peer/dev installs from
          # @sabonmichal/* resolve here too if ever added).
          registry-url: "https://npm.pkg.github.com"
          scope: "@sabonmichal"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist/ contains type declarations
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/webhooks/index.js
          test -f dist/webhooks/index.d.ts
